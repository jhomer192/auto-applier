<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apply — Senior Software Engineer at Acme Corp</title>
</head>
<body>
  <div class="company-name">Acme Corp</div>
  <h1>Apply for Senior Software Engineer</h1>

  <form id="application-form" action="../greenhouse_success.html" method="get">
    <!-- Standard Greenhouse fields -->
    <div class="field">
      <label for="first_name">First Name *</label>
      <input type="text" id="first_name" name="first_name" required>
    </div>
    <div class="field">
      <label for="last_name">Last Name *</label>
      <input type="text" id="last_name" name="last_name" required>
    </div>
    <div class="field">
      <label for="email">Email *</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="field">
      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="phone">
    </div>
    <div class="field">
      <label for="resume">Resume/CV *</label>
      <input type="file" id="resume" name="resume" required>
    </div>
    <div class="field">
      <label for="cover_letter">Cover Letter</label>
      <textarea id="cover_letter" name="cover_letter" rows="6"></textarea>
    </div>
    <div class="field">
      <label for="linkedin_profile">LinkedIn Profile</label>
      <input type="text" id="linkedin_profile" name="linkedin_profile">
    </div>
    <div class="field">
      <label for="years_experience">Years of Experience</label>
      <select id="years_experience" name="years_experience">
        <option value="">Select...</option>
        <option value="0-2">0-2 years</option>
        <option value="3-5">3-5 years</option>
        <option value="6-10">6-10 years</option>
        <option value="10+">10+ years</option>
      </select>
    </div>
    <div class="field">
      <label for="us_authorized">Are you legally authorized to work in the US?</label>
      <input type="checkbox" id="us_authorized" name="us_authorized">
    </div>
    <!-- Hidden / noise fields that scraper should skip -->
    <input type="hidden" name="utf8" value="✓">
    <input type="hidden" name="authenticity_token" value="token123">
    <button type="submit" id="submit-btn">Submit Application</button>
  </form>
</body>
</html>
